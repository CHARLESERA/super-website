<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SmartFood</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #ff7043, #ff5722);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    .login-box h2 {
      color: #ff7043;
      margin-bottom: 25px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: #ff7043;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
      transition: background 0.3s;
    }

    .login-box button:hover {
      background: #ff5722;
    }

    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }

    a.back-home {
      display: block;
      margin-top: 15px;
      text-decoration: none;
      color: #ff7043;
      font-weight: bold;
    }

    a.back-home:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Enter username" required>
    <input type="password" id="password" placeholder="Enter password" required>
    <button onclick="login()">Login</button>
    <p class="error-message" id="error"></p>
    <a href="index.html" class="back-home">← Back to Home</a>
  </div>

  <script>
    // Simple login validation using JavaScript (no backend)
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');

      // Example admin credentials (can be changed)
      const adminUser = "charles";
      const adminPass = "2003";

      if (user === adminUser && pass === adminPass) {
        window.location.href = "index.html";
      } else {
        error.textContent = "Invalid username or password!";
      }
    }
  </script>

</body>
</html>
